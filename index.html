<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walid Nabil — Portfolio</title>
  <meta name="description" content="Walid Nabil — Software Developer Portfolio styled as an Ubuntu Desktop.">
  <meta name="theme-color" content="#2c001e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta property="og:title" content="Walid Nabil — Portfolio">
  <meta property="og:description" content="Interactive Ubuntu-themed developer portfolio.">
  <meta property="og:type" content="website">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23e95420'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>W</text></svg>">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/boot.css">
  <link rel="stylesheet" href="css/desktop.css">
  <link rel="stylesheet" href="css/windows.css">
  <link rel="stylesheet" href="css/apps.css">
  <link rel="stylesheet" href="css/rtl.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- ═══ Boot Screen ═══ -->
  <div id="boot-screen">
    <svg class="ubuntu-logo" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="128" cy="128" r="120" fill="none" stroke="#fff" stroke-width="3" opacity="0.1"/>
      <g>
        <circle cx="128" cy="40" r="20" fill="#fff"/>
        <circle cx="51" cy="172" r="20" fill="#fff"/>
        <circle cx="205" cy="172" r="20" fill="#fff"/>
        <path d="M128 68 C 80 68, 48 104, 48 148" stroke="#fff" stroke-width="12" fill="none" stroke-linecap="round"/>
        <path d="M68 164 C 92 204, 148 220, 196 196" stroke="#fff" stroke-width="12" fill="none" stroke-linecap="round"/>
        <path d="M196 148 C 196 104, 172 72, 140 56" stroke="#fff" stroke-width="12" fill="none" stroke-linecap="round"/>
      </g>
    </svg>
    <div class="boot-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- ═══ Login Screen ═══ -->
  <div id="login-screen">
    <div class="login-time">--:--</div>
    <div class="login-date"></div>
    <div class="login-avatar-wrapper">
      <div class="login-avatar">W</div>
      <div class="login-name">Walid Nabil</div>
      <div class="login-hint" data-i18n-en="Click to log in" data-i18n-ar="اضغط لتسجيل الدخول">Click to log in</div>
    </div>
    <div class="login-unlock-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <span data-i18n-en="Click or press Enter" data-i18n-ar="اضغط أو اضغط Enter">Click or press Enter</span>
    </div>
  </div>

  <!-- ═══ Desktop ═══ -->
  <div id="desktop">
    <div class="desktop-wallpaper"></div>

    <!-- Top Panel -->
    <div class="top-panel">
      <div class="panel-left">
        <button class="activities-btn">Activities</button>
      </div>
      <div class="panel-center">---</div>
      <div class="panel-right">
        <span class="lang-toggle">عربي</span>
        <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l4 4m0 0l4 4M5 5l4-4M5 5l-4 4"/><path d="M8.5 16.5a5 5 0 117-7 5 5 0 01-7 7z" fill="currentColor" opacity="0.4"/></svg>
        <svg class="panel-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5z"/></svg>
        <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="18" height="12" rx="2"/><line x1="23" y1="13" x2="23" y2="11"/></svg>
      </div>
    </div>

    <!-- Dock -->
    <div class="dock"></div>

    <!-- Window Area -->
    <div class="window-area"></div>

    <!-- Context Menu -->
    <div class="context-menu">
      <div class="context-menu-item" data-action="terminal">▸ Open Terminal</div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" data-action="about">ℹ About This Portfolio</div>
    </div>
  </div>

  <!-- Scripts (order matters) -->
  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/window-manager.js"></script>
  <script src="js/apps.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/boot.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      I18n.init();
      Boot.init();
    });
  </script>
</body>
</html>
